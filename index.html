<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status</title>
    <style>
        .status-container { font-family: sans-serif; padding: 20px; }
        .status { font-weight: bold; }
        .online { color: green; }
        .offline { color: red; }
    </style>
</head>
<body>

<div class="status-container">
    <h2>My Minecraft Server</h2>
    <p>Status: <span id="server-status">Loading...</span></p>
    <p>Players: <span id="player-count">-</span></p>
</div>

<script>
    const serverIP = '5.143.129.175'; 

    async function checkServerStatus() {
        try {
            const response = await fetch(`https://mcsrvstat.us/server/{serverIP}`);
            const data = await response.json();

            const statusElement = document.getElementById('server-status');
            const playersElement = document.getElementById('player-count');

            if (data.online) {
                statusElement.textContent = "Online";
                statusElement.className = "status online";
                playersElement.textContent = `${data.players.online} / ${data.players.max}`;
            } else {
                statusElement.textContent = "Offline";
                statusElement.className = "status offline";
                playersElement.textContent = "0 / 0";
            }
        } catch (error) {
            document.getElementById('server-status').textContent = "Error loading status";
            console.error("API Error:", error);
        }
    }

    checkServerStatus();
</script>

</body>
</html>
