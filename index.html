<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Status</title>
    <style>
        .status-container { font-family: sans-serif; padding: 20px; text-align: center; }
        .status { font-weight: bold; padding: 5px 10px; border-radius: 4px; }
        .online { color: white; background-color: green; }
        .offline { color: white; background-color: red; }
    </style>
</head>
<body>

<div class="status-container">
    <h2>My Minecraft Server</h2>
    <p>Status: <span id="server-status" class="status" style="background: gray; color: white;">Loading...</span></p>
    <p>Players: <span id="player-count">-</span></p>
</div>

<script>
    const serverIP = '5.143.129.175'; 

    async function checkServerStatus() {
        try {
            const response = await fetch(`https://mcsrvstat.us{serverIP}`, {
                headers: {
                    'User-Agent': 'GitHubPagesMinecraftStatusWidget/1.0'
                }
            });
            
            if (!response.ok) throw new Error('API Error');
            const data = await response.json();

            const statusElement = document.getElementById('server-status');
            const playersElement = document.getElementById('player-count');

            if (data.online === true) {
                statusElement.textContent = "Online";
                statusElement.className = "status online";
                playersElement.textContent = `${data.players.online} / ${data.players.max}`;
            } else {
                statusElement.textContent = "Offline";
                statusElement.className = "status offline";
                playersElement.textContent = "0 / 0";
            }
        } catch (error) {
            document.getElementById('server-status').textContent = "Connection Error";
            document.getElementById('server-status').className = "status offline";
            console.error("API Error:", error);
        }
    }

    checkServerStatus();
</script>

</body>
</html>
