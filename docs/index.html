<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Server Status</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header class="server-header">
            <img id="server-icon" src="" alt="Server Icon">

            <div>
                <h1>Iko's Server</h1>
                <p id="server-address">---</p>
            </div>
        </header>

        <section class="status-card">
            <div class="status-row">
                <span>Status</span>
                <strong id="server-status">Loading...</strong>
            </div>

            <div class="status-row">
                <span>Players</span>
                <strong id="player-count">- / -</strong>
            </div>

            <div class="status-row">
                <span>Version</span>
                <strong id="server-version">-</strong>
            </div>
        </section>

        <section class="motd-card">
            <h2>Server's Description</h2>
            <p id="server-motd">Loading...</p>
        </section>

        <section class="players-card">
            <h2>Players Online</h2>
            <div id="players-list">Loading...</div>
        </section>

        <p id="last-updated"></p>

        <button id="refresh-button">Refresh</button>
        <div class="information-grid">
            <section class="readme-section">
                <h2>Information</h2>
                <div id="readme-content">Loading Information...</div>
            
                <button id="reveal-readme-button" hidden>
                    Reveal
                </button>
            </section>
        
            <section class="changelog-section">
                <h2>Changelog</h2>
                <div id="changelog-content">Loading Changelog...</div>
        
                <button id="reveal-changelog-button" hidden>
                    Reveal
                </button>
            </section>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
